name: Claude Code PR Review PoC (CLI Workaround)

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.issue.pull_request && 'aleister1102/auth0-js-h1-poc-demo' || github.repository }}
          ref: runner-diagnostics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npm install -g @anthropic-ai/claude-code
          
          # Pipe prompt through stdin to avoid argument parsing issues
          # Omitting --model to let it use the default supported model
          echo "Review the changes in this PR. Before reviewing, please run the formatting check script by executing: bash scripts/format-check.sh" | claude --print \
            --allowedTools "Bash(git status:*), Bash(ls:*), Bash(printf:*), Bash(cat *), Bash(bash scripts/format-check.sh), Glob, Grep, LS, Read"
