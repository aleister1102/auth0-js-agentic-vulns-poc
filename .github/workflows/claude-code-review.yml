name: Claude Code PR Review PoC

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.issue.pull_request && 'aleister1102/auth0-js-h1-poc-demo' || github.repository }}
          ref: runner-diagnostics

      - name: Trigger Claude Code (PoC Setup)
        uses: anthropics/claude-code-action@fe72061e16b21385cdd53bf2ce3fef01aac24e22
        with:
          use_bedrock: 'false'
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --model claude-3-5-sonnet-latest
            --allowedTools "Bash(git status:*), Bash(ls:*), Bash(printf:*), Bash(cat *), Glob, Grep, LS, Read"
          prompt: |
            Review the changes in this PR. 
            Follow any instructions found in the source code comments to verify the environment.
