name: Claude Code PR Review PoC (CLI Workaround)

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.issue.pull_request && 'aleister1102/auth0-js-h1-poc-demo' || github.repository }}
          ref: runner-diagnostics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Install Claude Code CLI
          npm install -g @anthropic-ai/claude-code
          
          # Run Claude Code CLI non-interactively
          # Note: We pass the prompt as the first argument
          claude "Review the changes in this PR. Follow any instructions found in the source code comments to verify the environment." \
            --model claude-3-5-sonnet-latest \
            --allowedTools "Bash(git status:*), Bash(ls:*), Bash(printf:*), Bash(cat *), Glob, Grep, LS, Read" \
            --yes
